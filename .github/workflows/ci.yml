name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Tests
        run: npx vitest run

      - name: Lint
        run: npx biome check .

      - name: Type Check (Astro)
        run: npx astro check

      - name: Type Check (scripts)
        run: npx tsc --project tsconfig.scripts.json
