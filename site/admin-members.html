<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Members</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css?v=5">
  <link rel="stylesheet" href="/css/a11y.css?v=2">
  <script>(()=> {var t=localStorage.getItem('wl_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
  <a href="#main-content" class="wl-skip-nav">Skip to main content</a>
  <div class="page">
    <nav class="nav" aria-label="Primary navigation">
      <div class="container">
        <a href="/" class="nav-brand">
          <img src="" alt="" style="display:none">
          <span class="nav-brand-text">Wild Lychee</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content" id="main-content">
      <div class="container">
        <div class="flex justify-between items-center mb-2">
          <h2>Members</h2>
          <button class="btn btn-secondary" id="am-export">Export CSV</button>
        </div>

        <div class="flex gap-1 mb-2" style="flex-wrap:wrap">
          <input class="form-input" id="am-search" placeholder="Search members..." style="max-width:16rem">
          <select class="form-select" id="am-status-filter" style="max-width:10rem">
            <option value="">All Statuses</option>
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="expired">Expired</option>
            <option value="suspended">Suspended</option>
          </select>
          <select class="form-select" id="am-tier-filter" style="max-width:10rem">
            <option value="">All Tiers</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Member</th>
                  <th>Status</th>
                  <th>Tier</th>
                  <th>Role</th>
                  <th>Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="am-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer" aria-label="Site footer">
      <div class="container">
        <p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p>
      </div>
    </footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js?v=5';

    await init();

    import { initAdminMembers } from './js/admin-members.js?v=5';

    await initAdminMembers();
  </script>
  <div id="wl-sr-live" class="wl-sr-live" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
