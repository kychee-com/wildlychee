<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css?v=5">
  <link rel="stylesheet" href="/css/a11y.css?v=2">
  <script>(()=> {var t=localStorage.getItem('wl_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
  <a href="#main-content" class="wl-skip-nav">Skip to main content</a>
  <div class="page">
    <nav class="nav" aria-label="Primary navigation">
      <div class="container">
        <a href="/" class="nav-brand">
          <img src="" alt="" style="display:none">
          <span class="nav-brand-text">Wild Lychee</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content" id="main-content">
      <div class="container" style="max-width:36rem">
        <h2 class="mb-2">Your Profile</h2>
        <form id="profile-form">
          <div class="text-center mb-2">
            <label style="cursor:pointer">
              <img id="profile-avatar-img" class="member-avatar" src="" alt="Avatar" style="width:5rem;height:5rem;margin:0 auto;display:block">
              <input type="file" id="profile-avatar-upload" accept="image/*" class="hidden">
              <span class="text-sm text-muted">Click to change</span>
            </label>
          </div>
          <div class="form-group">
            <label class="form-label" for="profile-name">Display Name</label>
            <input class="form-input" id="profile-name" type="text" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="profile-bio">Bio</label>
            <textarea class="form-textarea" id="profile-bio" rows="3"></textarea>
          </div>
          <div id="custom-fields"></div>
          <button type="submit" class="btn btn-primary" id="profile-save">Save</button>
        </form>
      </div>
    </main>

    <footer class="footer" aria-label="Site footer">
      <div class="container">
        <p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p>
      </div>
    </footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js?v=5';

    await init();

    import { initProfile } from './js/profile.js?v=5';

    await initProfile();
  </script>
  <div id="wl-sr-live" class="wl-sr-live" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
