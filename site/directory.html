<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css?v=9">
  <link rel="stylesheet" href="/css/a11y.css?v=2">
  <script>(()=> {var t=localStorage.getItem('wl_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
  <a href="#main-content" class="wl-skip-nav">Skip to main content</a>
  <div class="page">
    <nav class="nav" aria-label="Primary navigation">
      <div class="container">
        <a href="/" class="nav-brand">
          <img src="" alt="" style="display:none">
          <span class="nav-brand-text">Wild Lychee</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <main class="page-content" id="main-content">
      <div class="container">
        <h2 class="mb-2">Member Directory</h2>
        <div class="flex gap-1 mb-2" style="flex-wrap:wrap">
          <input class="form-input" id="dir-search" placeholder="Search members..." style="max-width:20rem">
          <select class="form-select" id="dir-tier-filter" style="max-width:12rem">
            <option value="">All Tiers</option>
          </select>
        </div>
        <div class="card-grid" id="dir-grid"></div>
      </div>
    </main>

    <!-- Member Detail Modal -->
    <div class="auth-modal hidden" id="member-modal">
      <div class="auth-panel" style="max-width:28rem">
        <div class="text-center mb-2">
          <img id="mm-avatar" class="member-avatar" src="" alt="" style="width:5rem;height:5rem;margin:0 auto;display:block">
          <h3 id="mm-name" class="mt-1"></h3>
          <span class="badge badge-primary" id="mm-tier"></span>
          <p class="text-sm text-muted" id="mm-joined"></p>
        </div>
        <p id="mm-bio" class="text-muted"></p>
        <div id="mm-custom-fields" class="mt-1"></div>
        <button class="btn btn-secondary mt-2" style="width:100%" onclick="document.getElementById('member-modal').classList.add('hidden')">Close</button>
      </div>
    </div>

    <footer class="footer" aria-label="Site footer">
      <div class="container">
        <p>Powered by <a href="https://wildlychee.com">Wild Lychee</a></p>
      </div>
    </footer>
  </div>

  <script src="/js/env.js"></script>
  <script type="module">
    import { init } from './js/config.js?v=9';

    await init();

    import { initDirectory } from './js/directory.js?v=9';

    await initDirectory();
  </script>
  <div id="wl-sr-live" class="wl-sr-live" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
