<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/styles.css?v=5">
  <link rel="stylesheet" href="/css/a11y.css?v=2">
  <script>(()=> {var t=localStorage.getItem('wl_theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';if(t==='dark')document.documentElement.setAttribute('data-theme','dark')})()</script>
</head>
<body>
  <a href="#main-content" class="wl-skip-nav">Skip to main content</a>
  <div class="page">
    <!-- NAV: Navigation -->
    <nav class="nav" aria-label="Primary navigation">
      <div class="container">
        <a href="/" class="nav-brand">
          <img src="" alt="" style="display:none">
          <span class="nav-brand-text">Wild Lychee</span>
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu">&#9776;</button>
        <div class="nav-links" id="nav-links"></div>
        <div class="nav-user" id="nav-user"></div>
      </div>
    </nav>

    <!-- CONTENT: Main content -->
    <main class="page-content" id="main-content">
      <div id="sections">
        <div class="section section-visible" id="sections-skeleton" style="padding:2rem 0">
          <div class="container"><div class="skeleton skeleton-card mb-1"></div><div class="skeleton skeleton-card mb-1"></div></div>
        </div>
      </div>

      <div class="container">
        <section class="section" id="announcements-section">
          <h2 id="announcements-title">Announcements</h2>
          <div id="announcement-create" class="hidden mb-2"></div>
          <div id="announcements-feed">
            <div class="card mb-1"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
            <div class="card mb-1"><div class="skeleton skeleton-heading"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text"></div></div>
          </div>
        </section>
      </div>
    </main>

    <!-- FOOTER: Site footer -->
    <footer class="footer" aria-label="Site footer">
      <div class="container">
        <p>Powered by <a href="https://wildlychee.com">Wild Lychee</a> on <a href="https://run402.com">Run402</a></p>
      </div>
    </footer>

    <!-- Auth Modal -->
    <div class="auth-modal hidden" id="auth-modal">
      <div class="auth-panel">
        <h2 id="auth-title">Sign In</h2>
        <div id="auth-error" class="text-sm hidden" style="color:var(--color-danger);margin-bottom:1rem"></div>

        <button class="btn-google" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
          Sign in with Google
        </button>

        <div class="auth-divider">or</div>

        <form id="auth-form">
          <div class="form-group">
            <label class="form-label" for="auth-email">Email</label>
            <input class="form-input" type="email" id="auth-email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="auth-password">Password</label>
            <input class="form-input" type="password" id="auth-password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%" id="auth-submit-btn">Sign In</button>
        </form>

        <p class="text-sm text-muted mt-2 text-center">
          <a href="#" id="auth-toggle">Don't have an account? Sign up</a>
        </p>
        <p class="text-sm text-muted mt-1 text-center">
          <a href="#" id="auth-close">Close</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/animations.js?v=2"></script>
  <script src="/js/env.js"></script>
  <script type="module">
    import { announce, releaseFocus, trapFocus } from './js/accessibility.js?v=5';
    import { del, get, patch, post } from './js/api.js?v=5';
    import { getSession, handleOAuthCallback, isAdmin, isAuthenticated, signIn, signInWithGoogle, signUp } from './js/auth.js?v=5';
    import { init, isFeatureEnabled, getTranslatedContent } from './js/config.js?v=5';
    import { getLocale } from './js/i18n.js?v=5';
    import { showToast } from './js/toast.js?v=5';

    // Handle OAuth callback
    const session = await handleOAuthCallback();
    if (session) window.location.reload();

    // If hash is #signup, show modal
    if (window.location.hash === '#signup') {
      const modal = document.getElementById('auth-modal');
      modal?.classList.remove('hidden');
      if (modal) trapFocus(modal.querySelector('.auth-panel'));
    }

    // Init config, nav, theme
    const config = await init();

    // --- Render homepage sections ---
    async function translateSectionConfig(section) {
      const locale = getLocale();
      if (!locale || locale === (config.default_language || 'en')) return section;
      const translated = await getTranslatedContent('section', section.id, 'config');
      if (translated) {
        try { section.config = JSON.parse(translated); } catch {}
      }
      return section;
    }

    async function renderSections() {
      const container = document.getElementById('sections');
      if (!container) return;
      try {
        const sections = await get('sections?page_slug=eq.index&visible=eq.true&order=position.asc');
        // Remove skeleton
        const skel = document.getElementById('sections-skeleton');
        if (skel) skel.remove();
        for (const section of sections) {
          await translateSectionConfig(section);
          container.appendChild(renderSection(section));
        }
      } catch (e) {
        console.warn('Failed to load sections:', e);
        const skel = document.getElementById('sections-skeleton');
        if (skel) skel.remove();
      }
    }

    function renderSection(section) {
      const cfg = section.config;
      const el = document.createElement('section');

      switch (section.section_type) {
        case 'hero':
          el.className = 'section section-hero';
          el.innerHTML = `
            <div class="container">
              <h1>${esc(cfg.heading || '')}</h1>
              <p>${esc(cfg.subheading || '')}</p>
              ${cfg.cta_text ? `<a href="${esc(cfg.cta_href || '#')}" class="btn btn-primary btn-lg">${esc(cfg.cta_text)}</a>` : ''}
            </div>`;
          if (cfg.bg_image) el.style.backgroundImage = `url(${cfg.bg_image})`;
          break;

        case 'features': {
          el.className = 'section section-features';
          const cols = cfg.columns || 3;
          el.innerHTML = `
            <div class="container">
              <div class="features-grid" style="--cols:${cols}">
                ${(cfg.items || []).map(item => `
                  <div class="feature-card">
                    <div class="feature-icon">${featureIcon(item.icon)}</div>
                    <h3>${esc(item.title || '')}</h3>
                    <p>${esc(item.desc || '')}</p>
                  </div>`).join('')}
              </div>
            </div>`;
          break;
        }

        case 'cta':
          el.className = 'section section-cta';
          el.innerHTML = `
            <div class="container">
              <h2>${esc(cfg.heading || '')}</h2>
              <p class="text-muted mt-1">${esc(cfg.text || '')}</p>
              ${cfg.cta_text ? `<a href="${esc(cfg.cta_href || '#')}" class="btn btn-primary btn-lg mt-2">${esc(cfg.cta_text)}</a>` : ''}
            </div>`;
          break;

        case 'stats':
          el.className = 'section section-stats';
          el.innerHTML = `
            <div class="container">
              <div class="stats-grid">
                ${(cfg.items || []).map(s => `
                  <div class="stat-card">
                    <div class="stat-value">${esc(s.value || '')}</div>
                    <div class="stat-label">${esc(s.label || '')}</div>
                  </div>`).join('')}
              </div>
            </div>`;
          break;

        case 'testimonials':
          el.className = 'section';
          el.innerHTML = `
            <div class="container">
              <div class="card-grid">
                ${(cfg.items || []).map(t => `
                  <div class="card">
                    <p style="font-style:italic">"${esc(t.quote || '')}"</p>
                    <p class="text-sm text-muted mt-1">— ${esc(t.name || '')}${t.role ? `, ${esc(t.role)}` : ''}</p>
                  </div>`).join('')}
              </div>
            </div>`;
          break;

        case 'faq':
          el.className = 'section';
          el.innerHTML = `
            <div class="container">
              <h2 class="mb-2">FAQ</h2>
              ${(cfg.items || []).map(f => `
                <details class="card mb-1" style="cursor:pointer">
                  <summary style="font-weight:600">${esc(f.q || '')}</summary>
                  <p class="text-muted mt-1">${esc(f.a || '')}</p>
                </details>`).join('')}
            </div>`;
          break;

        case 'event-countdown':
          if (!isFeatureEnabled('feature_events')) { el.style.display = 'none'; break; }
          el.className = 'section section-event-countdown';
          el.innerHTML = `<div class="container" id="event-countdown-inner"><p class="text-muted">Loading...</p></div>`;
          loadEventCountdown(el.querySelector('#event-countdown-inner'));
          break;

        case 'activity_feed':
          if (!isFeatureEnabled('feature_activity_feed')) { el.style.display = 'none'; break; }
          el.className = 'section section-activity-feed';
          el.innerHTML = `
            <div class="container">
              <h2 class="mb-2">Recent Activity</h2>
              <div class="activity-feed" id="activity-feed">
                <p class="text-muted">Loading activity...</p>
              </div>
            </div>`;
          // loadActivityFeed is called from boot sequence after sections are in DOM
          break;

        default:
          el.className = 'section';
          if (cfg.html) el.innerHTML = `<div class="container">${cfg.html}</div>`;
          break;
      }
      return el;
    }

    function featureIcon(name) {
      const icons = {
        users: '👥', calendar: '📅', 'book-open': '📖', 'message-circle': '💬',
        home: '🏠', settings: '⚙️', 'bar-chart-2': '📊', shield: '🛡',
      };
      return icons[name] || '✦';
    }

    // --- Activity feed ---
    const ACTION_TEMPLATES = {
      member_join: (m) => `<strong>${esc(m.name)}</strong> joined the community`,
      announcement: (m) => `<strong>${esc(m.name)}</strong> posted an announcement: ${esc(m.meta.title || '')}`,
      rsvp: (m) => `<strong>${esc(m.name)}</strong> is going to <strong>${esc(m.meta.event_title || m.meta.event || '')}</strong>`,
      resource_upload: (m) => `<strong>${esc(m.name)}</strong> shared a resource: ${esc(m.meta.title || '')}`,
      forum_post: (m) => `<strong>${esc(m.name)}</strong> started a discussion: ${esc(m.meta.title || '')}`,
      reaction: (m) => `<strong>${esc(m.name)}</strong> reacted to ${esc(m.meta.content_type || 'a post')}`,
    };

    function renderActivityEntry(entry, member) {
      const name = member ? member.display_name : 'Former member';
      const avatar = member?.avatar_url
        ? `<img class="activity-avatar" src="${member.avatar_url}" alt="">`
        : `<div class="activity-avatar activity-avatar-fallback">${(name[0] || '?').toUpperCase()}</div>`;
      const meta = entry.metadata || {};
      const tmpl = ACTION_TEMPLATES[entry.action];
      const desc = tmpl ? tmpl({ name, meta }) : `<strong>${esc(name)}</strong> was active`;
      return `
        <div class="activity-entry">
          ${avatar}
          <div class="activity-entry-content">
            <div class="activity-entry-text">${desc}</div>
            <div class="activity-entry-time">${timeAgo(entry.created_at)}</div>
          </div>
        </div>`;
    }

    function timeAgo(iso) {
      const seconds = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    async function loadActivityFeed(limit) {
      const feed = document.getElementById('activity-feed');
      if (!feed) return;
      try {
        const entries = await get(`activity_log?order=created_at.desc&limit=${limit}`);
        if (entries.length === 0) {
          feed.innerHTML = '<p class="text-muted">No recent activity yet.</p>';
          return;
        }
        // Collect unique member IDs and fetch members
        const memberIds = [...new Set(entries.map(e => e.member_id).filter(Boolean))];
        const membersMap = {};
        if (memberIds.length > 0) {
          const members = await get(`members?id=in.(${memberIds.join(',')})`);
          for (const m of members) membersMap[m.id] = m;
        }
        feed.innerHTML = entries.map(e => renderActivityEntry(e, membersMap[e.member_id])).join('');
      } catch (e) {
        feed.innerHTML = '<p class="text-muted">Could not load activity.</p>';
      }
    }

    // --- Event countdown ---
    async function loadEventCountdown(container) {
      if (!container) return;
      try {
        const now = new Date().toISOString();
        const events = await get(`events?start_date=gt.${now}&order=start_date.asc&limit=1`);
        if (events.length === 0) {
          container.closest('.section').style.display = 'none';
          return;
        }
        const evt = events[0];
        const targetDate = new Date(evt.start_date);

        function renderCountdown() {
          const diff = targetDate.getTime() - Date.now();
          if (diff <= 0) {
            container.innerHTML = `
              <h3 class="countdown-event-title"><a href="event.html?id=${evt.id}">${esc(evt.title)}</a></h3>
              <p class="text-muted mt-1">Happening now!</p>`;
            return;
          }
          const days = Math.floor(diff / 86400000);
          const hours = Math.floor((diff % 86400000) / 3600000);
          const minutes = Math.floor((diff % 3600000) / 60000);
          container.innerHTML = `
            <p class="text-muted text-sm" style="text-transform:uppercase;letter-spacing:0.05em">Coming up</p>
            <h3 class="countdown-event-title mt-1"><a href="event.html?id=${evt.id}">${esc(evt.title)}</a></h3>
            <div class="countdown-digits">
              <div class="countdown-unit"><span class="countdown-value">${days}</span><span class="countdown-label">days</span></div>
              <div class="countdown-unit"><span class="countdown-value">${hours}</span><span class="countdown-label">hours</span></div>
              <div class="countdown-unit"><span class="countdown-value">${minutes}</span><span class="countdown-label">min</span></div>
            </div>
            <a href="event.html?id=${evt.id}" class="btn btn-primary">View Event</a>`;
        }

        renderCountdown();
        setInterval(renderCountdown, 60000);
      } catch (e) {
        container.closest('.section').style.display = 'none';
      }
    }

    // --- Reactions ---
    const EMOJI_MAP = { like: '\u{1F44D}', heart: '\u2764\uFE0F', celebrate: '\u{1F389}', laugh: '\u{1F604}', think: '\u{1F914}' };
    const EMOJI_CODES = Object.keys(EMOJI_MAP);

    function renderReactionBar(announcementId, reactionCounts, myReactions) {
      const reactionsEnabled = isFeatureEnabled('feature_reactions');
      if (!reactionsEnabled) return '';

      const badges = Object.entries(reactionCounts)
        .filter(([, count]) => count > 0)
        .map(([emoji, count]) => {
          const isActive = myReactions.has(emoji);
          return `<button class="reaction-badge${isActive ? ' active' : ''}" data-ann-id="${announcementId}" data-emoji="${emoji}">${EMOJI_MAP[emoji]} <span class="reaction-count">${count}</span></button>`;
        }).join('');

      const session = getSession();
      const picker = session ? `
        <div class="reaction-picker">
          <button class="reaction-picker-btn" data-picker-for="${announcementId}" title="Add reaction">+</button>
          <div class="reaction-picker-dropdown" id="picker-${announcementId}">
            ${EMOJI_CODES.map(code => `<button data-ann-id="${announcementId}" data-emoji="${code}" title="${code}">${EMOJI_MAP[code]}</button>`).join('')}
          </div>
        </div>` : '';

      return `<div class="reaction-bar">${badges}${picker}</div>`;
    }

    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function animateReaction(badge, emoji) {
      if (reducedMotion) return;
      // Pop animation on badge
      badge.classList.remove('pop');
      void badge.offsetWidth; // force reflow to restart animation
      badge.classList.add('pop');
      badge.addEventListener('animationend', () => badge.classList.remove('pop'), { once: true });

      // Floating emoji
      const rect = badge.getBoundingClientRect();
      const floater = document.createElement('span');
      floater.className = 'reaction-float-emoji';
      floater.textContent = EMOJI_MAP[emoji] || emoji;
      floater.style.left = `${rect.left + rect.width / 2 - 10}px`;
      floater.style.top = `${rect.top - 10 + window.scrollY}px`;
      floater.style.position = 'absolute';
      document.body.appendChild(floater);
      floater.addEventListener('animationend', () => floater.remove(), { once: true });
    }

    async function toggleReaction(announcementId, emoji) {
      const session = getSession();
      if (!session) return;
      const memberId = session.user?.member?.id;
      if (!memberId) return;

      const existing = await get(`reactions?content_type=eq.announcement&content_id=eq.${announcementId}&member_id=eq.${memberId}&emoji=eq.${emoji}`);
      const isAdding = existing.length === 0;

      if (!isAdding) {
        await del(`reactions?id=eq.${existing[0].id}`);
      } else {
        await post('reactions', { content_type: 'announcement', content_id: announcementId, member_id: memberId, emoji });
        // Log activity
        await post('activity_log', { member_id: memberId, action: 'reaction', metadata: { content_type: 'announcement', content_id: announcementId, emoji } });
      }
      await renderAnnouncements();

      // Animate the newly rendered badge if it was an add
      if (isAdding) {
        const badge = document.querySelector(`.reaction-badge[data-ann-id="${announcementId}"][data-emoji="${emoji}"]`);
        if (badge) animateReaction(badge, emoji);
      }
    }

    // --- Render announcements ---
    async function renderAnnouncements() {
      const feed = document.getElementById('announcements-feed');
      if (!feed) return;
      try {
        const items = await get('announcements?order=is_pinned.desc,created_at.desc&limit=20');
        if (items.length === 0) {
          feed.innerHTML = '<p class="text-muted">No announcements yet.</p>';
          return;
        }

        // Fetch reactions for all announcements in batch
        const annIds = items.map(a => a.id);
        const reactionsByAnn = {};
        const myReactionsByAnn = {};
        const reactionsEnabled = isFeatureEnabled('feature_reactions');
        if (reactionsEnabled && annIds.length > 0) {
          const allReactions = await get(`reactions?content_type=eq.announcement&content_id=in.(${annIds.join(',')})`);
          const session = getSession();
          const myId = session?.user?.member?.id;
          for (const r of allReactions) {
            if (!reactionsByAnn[r.content_id]) reactionsByAnn[r.content_id] = {};
            reactionsByAnn[r.content_id][r.emoji] = (reactionsByAnn[r.content_id][r.emoji] || 0) + 1;
            if (myId && r.member_id === myId) {
              if (!myReactionsByAnn[r.content_id]) myReactionsByAnn[r.content_id] = new Set();
              myReactionsByAnn[r.content_id].add(r.emoji);
            }
          }
        }

        feed.innerHTML = items.map(a => `
          <div class="announcement card mb-1 ${a.is_pinned ? 'pinned' : ''}" data-id="${a.id}">
            <div class="announcement-title" data-editable="announcements.${a.id}.title">${esc(a.title)}</div>
            <div class="announcement-body" data-editable-rich="announcements.${a.id}.body">${a.body}</div>
            <div class="announcement-meta">
              ${a.is_pinned ? '<span class="badge badge-primary">Pinned</span> ' : ''}
              <span>${formatDate(a.created_at)}</span>
            </div>
            ${renderReactionBar(a.id, reactionsByAnn[a.id] || {}, myReactionsByAnn[a.id] || new Set())}
            ${isAdmin() ? `
              <div class="mt-1 flex gap-1">
                <button class="btn btn-sm btn-secondary ann-pin" data-id="${a.id}" data-pinned="${a.is_pinned}">${a.is_pinned ? 'Unpin' : 'Pin'}</button>
                <button class="btn btn-sm btn-danger ann-delete" data-id="${a.id}">Delete</button>
              </div>` : ''}
          </div>`).join('');

        // Reaction click handlers
        feed.querySelectorAll('.reaction-badge[data-ann-id]').forEach(btn => {
          btn.addEventListener('click', () => toggleReaction(parseInt(btn.dataset.annId, 10), btn.dataset.emoji));
        });
        feed.querySelectorAll('.reaction-picker-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById(`picker-${btn.dataset.pickerFor}`);
            document.querySelectorAll('.reaction-picker-dropdown.open').forEach(d => { if (d !== dropdown) d.classList.remove('open'); });
            dropdown?.classList.toggle('open');
          });
        });
        feed.querySelectorAll('.reaction-picker-dropdown button').forEach(btn => {
          btn.addEventListener('click', () => {
            btn.closest('.reaction-picker-dropdown')?.classList.remove('open');
            toggleReaction(parseInt(btn.dataset.annId, 10), btn.dataset.emoji);
          });
        });
        // Close picker on outside click
        document.addEventListener('click', () => {
          document.querySelectorAll('.reaction-picker-dropdown.open').forEach(d => d.classList.remove('open'));
        }, { once: true });

        // Admin actions
        feed.querySelectorAll('.ann-pin').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.dataset.id;
            const pinned = btn.dataset.pinned === 'true';
            await patch(`announcements?id=eq.${id}`, { is_pinned: !pinned });
            renderAnnouncements();
          });
        });
        feed.querySelectorAll('.ann-delete').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Delete this announcement?')) return;
            await del(`announcements?id=eq.${btn.dataset.id}`);
            renderAnnouncements();
          });
        });
      } catch (e) {
        feed.innerHTML = '<p class="text-muted">Could not load announcements.</p>';
      }
    }

    // --- Admin: announcement creation ---
    function setupAnnouncementCreate() {
      if (!isAdmin()) return;
      const container = document.getElementById('announcement-create');
      if (!container) return;
      container.classList.remove('hidden');
      container.innerHTML = `
        <div class="card">
          <h4 class="mb-1">New Announcement</h4>
          <div class="form-group">
            <input class="form-input" id="ann-title" placeholder="Title">
          </div>
          <div class="form-group">
            <textarea class="form-textarea" id="ann-body" placeholder="Write your announcement..."></textarea>
          </div>
          <button class="btn btn-primary" id="ann-post">Post</button>
        </div>`;
      document.getElementById('ann-post').addEventListener('click', async () => {
        const title = document.getElementById('ann-title').value.trim();
        const body = document.getElementById('ann-body').value.trim();
        if (!title || !body) return;
        const session = JSON.parse(localStorage.getItem('wl_session') || '{}');
        const memberId = session.user?.member?.id;
        await post('announcements', { title, body, author_id: memberId });
        // Log to activity
        if (memberId) {
          await post('activity_log', { member_id: memberId, action: 'announcement', metadata: { title } });
        }
        document.getElementById('ann-title').value = '';
        document.getElementById('ann-body').value = '';
        renderAnnouncements();
        showToast('Announcement posted', 'info');
        announce('Announcement posted successfully');
      });
    }

    // --- Auth modal handlers ---
    let isSignUp = false;
    document.getElementById('google-btn')?.addEventListener('click', signInWithGoogle);
    document.getElementById('auth-close')?.addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('auth-modal')?.classList.add('hidden');
      releaseFocus();
    });
    document.getElementById('auth-toggle')?.addEventListener('click', (e) => {
      e.preventDefault();
      isSignUp = !isSignUp;
      document.getElementById('auth-title').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.getElementById('auth-submit-btn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.getElementById('auth-toggle').textContent = isSignUp
        ? 'Already have an account? Sign in'
        : "Don't have an account? Sign up";
    });
    document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const errEl = document.getElementById('auth-error');
      errEl.classList.add('hidden');
      try {
        if (isSignUp) {
          await signUp(email, password);
          // Auto sign in after signup
          await signIn(email, password);
        } else {
          await signIn(email, password);
        }
        window.location.reload();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
      }
    });

    // --- Helpers ---
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // --- Boot ---
    await renderSections();
    loadActivityFeed(15);
    await renderAnnouncements();
    setupAnnouncementCreate();
  </script>
  <div id="wl-sr-live" class="wl-sr-live" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
